name: Deploy to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          password: ${{ secrets.PROD_SSH_PASSWORD }}
          port: ${{ secrets.PROD_SSH_PORT }}
          script: |
            set -e
            ROOT=/usr/home/awgefy/public_html/app.poapp.sk

            cd $ROOT
            git clean -f backend/composer.lock
            # Reset, not pull — a history rewrite on the remote would
            # otherwise stop the deploy with "divergent branches". The
            # server is never a source of truth for code; whatever is on
            # origin/main wins.
            git fetch origin main
            git reset --hard origin/main

            # Build frontend — output lands in frontend/dist/, which is
            # the actual document root for app.poapp.sk. The PHP
            # entry (frontend/public/api.php) is auto-copied to dist/ by
            # Vite. No further file shuffling is needed.
            cd $ROOT/frontend && npm ci && npm run build

            # Install PHP dependencies into backend/vendor (outside docroot).
            cd $ROOT/backend && composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

            # Install the Node deps for the Dokumentácia PO renderer
            # (docxtemplater). The PHP backend shells out to
            # backend/docx/render.mjs to fill the Word template before it is
            # converted to PDF. Requires FIROL_PDF_CONVERTER + the matching
            # FIROL_GOTENBERG_URL / FIROL_LIBREOFFICE_BIN in backend/.env.
            cd $ROOT/backend/docx && npm ci --omit=dev

            # Apply any pending DB migrations. The runner is idempotent —
            # already-applied migrations are skipped via the `migrations`
            # table. Requires backend/.env to be in place on the server.
            php $ROOT/backend/db/migrate.php

            # Make sure the storage tree exists for signatures, generated
            # PDFs and the mPDF scratch dir. Created at deploy time so the
            # web user owns them and we never hit a "tempDir not writable"
            # error on first PDF generation.
            mkdir -p $ROOT/backend/storage/signatures \
                     $ROOT/backend/storage/documents \
                     $ROOT/backend/storage/accounts \
                     $ROOT/backend/storage/trainings \
                     $ROOT/backend/storage/mpdf-tmp \
                     $ROOT/backend/storage/docx-tmp

            # One-time cleanup of artifacts a previous (broken) deploy
            # placed at the project root instead of frontend/dist/. Safe
            # to remove because the real docroot is frontend/dist/.
            rm -f  $ROOT/index.php $ROOT/index.html $ROOT/test.php
            rm -rf $ROOT/assets $ROOT/vendor $ROOT/src

            # Ensure the backup script is executable.
            chmod +x $ROOT/scripts/backup-db.sh

            # Install the nightly DB backup cron job (idempotent — adds the
            # line only if it is not already present in the crontab).
            CRON_CMD="0 2 * * * $ROOT/scripts/backup-db.sh >> /usr/home/awgefy/db-backups/backup.log 2>&1"
            ( crontab -l 2>/dev/null | grep -qF "$ROOT/scripts/backup-db.sh" ) \
              || ( crontab -l 2>/dev/null; echo "$CRON_CMD" ) | crontab -

      # Smoke-test the freshly deployed app from the GitHub runner. Fails
      # the workflow if /api/health doesn't return 200 — a stronger signal
      # than "ssh command succeeded" because it exercises the actual
      # docroot + PHP-FPM + DB chain.
      - name: Post-deploy healthcheck
        run: |
          set -e
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 https://app.poapp.sk/api.php?path=/api/health > /dev/null; then
              echo "Healthcheck OK"
              exit 0
            fi
            echo "Healthcheck attempt $i failed, retrying in 5s…"
            sleep 5
          done
          echo "Healthcheck failed after 5 attempts"
          exit 1
