name: Deploy to Websupport

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            ROOT=~/cstudios.ninja/sub/firol
            cd $ROOT
            git pull origin main

            # Build frontend
            cd $ROOT/frontend && npm ci && npm run build

            # Install PHP dependencies
            cd $ROOT/backend && composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

            # Deploy artifacts to webroot
            cp -r $ROOT/frontend/dist/. $ROOT/
            cp $ROOT/backend/public/index.php $ROOT/index.php
            cp $ROOT/backend/public/.htaccess $ROOT/.htaccess
            rsync -a --delete $ROOT/backend/vendor/ $ROOT/vendor/
            rsync -a --delete $ROOT/backend/src/ $ROOT/src/

            # Diagnostics: confirm what is actually in the deploy target.
            echo "=== ROOT path: $ROOT ==="
            echo "=== Resolved (readlink): $(readlink -f $ROOT) ==="
            echo "=== ls -la $ROOT/ (top level) ==="
            ls -la $ROOT/
            echo "=== index.php exists? ==="
            ls -la $ROOT/index.php || echo "MISSING"
            echo "=== which php ==="
            which php && php -v
