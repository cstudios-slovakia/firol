name: Deploy to Websupport

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            ROOT=~/cstudios.ninja/sub/firol
            cd $ROOT
            git pull origin main

            # Build frontend — output lands in frontend/dist/, which is
            # the actual document root for firol.cstudios.ninja. The PHP
            # entry (frontend/public/api.php) is auto-copied to dist/ by
            # Vite. No further file shuffling is needed.
            cd $ROOT/frontend && npm ci && npm run build

            # Install PHP dependencies into backend/vendor (outside docroot).
            cd $ROOT/backend && composer install --no-dev --optimize-autoloader --prefer-dist --no-interaction --no-progress

            # One-time cleanup of artifacts a previous (broken) deploy
            # placed at the project root instead of frontend/dist/. Safe
            # to remove because the real docroot is frontend/dist/.
            rm -f  $ROOT/index.php $ROOT/index.html $ROOT/test.php
            rm -rf $ROOT/assets $ROOT/vendor $ROOT/src
