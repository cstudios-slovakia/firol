services:
  php:
    build:
      context: ./docker/php
    container_name: firol-php
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    environment:
      PHP_DISPLAY_ERRORS: "1"
      # Dokumentácia PO — fill DOCX with Node (bundled in the image) then
      # convert to PDF via the Gotenberg sidecar. Prod overrides these in
      # backend/.env.
      FIROL_NODE_BIN: "node"
      FIROL_PDF_CONVERTER: "gotenberg"
      FIROL_GOTENBERG_URL: "http://gotenberg:3000"
    networks: [firol]
    depends_on:
      db:
        condition: service_healthy
      gotenberg:
        condition: service_started

  # Headless DOCX→PDF conversion for the Dokumentácia PO module. Runs as a
  # container so no system packages (LibreOffice) are needed on the host.
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: firol-gotenberg
    restart: unless-stopped
    networks: [firol]

  nginx:
    image: nginx:1.27-alpine
    container_name: firol-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/backend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [php]
    networks: [firol]

  db:
    image: mariadb:11
    container_name: firol-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: firol
      MARIADB_USER: firol
      MARIADB_PASSWORD: firol
    volumes:
      - dbdata:/var/lib/mysql
    networks: [firol]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  dbdata:

networks:
  firol:
    driver: bridge
